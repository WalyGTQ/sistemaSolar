<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sistema Solar 3D — Versión Online (CDNs)</title>
  <style>
    :root{--bg:#070914;--panel:#0d1224d0;--text:#e9eef7;--muted:#9fb0cf;--ring:#89a0ff55}
    *{box-sizing:border-box} html,body{height:100%;margin:0;background:radial-gradient(1000px 600px at 70% 30%,#0d1329 0%,#080b18 60%,#05060d 100%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial}
    #app{position:fixed;inset:0;display:grid;grid-template-columns:minmax(0,1fr) 320px}
    #ui{padding:14px;border-left:1px solid #1a2246;background:linear-gradient(180deg,var(--panel),#0b0f20);backdrop-filter:blur(6px) saturate(1.1);overflow:auto}
    .btn{border:1px solid #24305d;background:#10162b;color:var(--text);padding:8px 10px;border-radius:12px;font-weight:600;cursor:pointer}
    .row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin:10px 0}
    .val{min-width:48px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}
    .list{display:grid;gap:6px}
    .card{background:#0b1022;border:1px solid #1a2246;border-radius:12px;padding:8px 10px;display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center}
    .dot{width:10px;height:10px;border-radius:50%}
    .meta{font-size:11px;color:var(--muted)}
    #hud{position:absolute;left:12px;bottom:12px;color:#9fb0cf;font-size:12px}
    #fps{position:absolute;right:12px;bottom:12px;background:#0b1022;border:1px solid #1a2246;border-radius:10px;padding:6px 8px;font-variant-numeric:tabular-nums;font-size:12px}
  </style>
</head>
<body>
<div id="app">
  <div style="position:relative">
    <div id="scene" style="position:absolute;inset:0"></div>
    <div id="labels" style="position:absolute;inset:0;pointer-events:none"></div>
    <div id="hud">Arrastra para orbitar · Rueda para zoom · Doble click para reset · Teclas: 1–9, F (enfocar)</div>
    <div id="fps">FPS: —</div>
  </div>
  <aside id="ui" aria-label="Panel de control">
    <h1 style="margin:0 0 6px;font-size:18px">Sistema Solar 3D (Online)</h1>
    <div class="meta" style="margin-bottom:8px">CDNs: three.js + CSS2DRenderer — código ligero</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 6px">
      <button id="play" class="btn">⏵︎ Reproducir</button>
      <button id="resetT" class="btn">⟲ Tiempo</button>
      <button id="photo" class="btn">📷 Modo foto</button>
    </div>
    <div class="row"><label for="speed">Velocidad</label><div id="speedVal" class="val">1×</div></div>
    <input id="speed" type="range" min="0.25" max="32" value="1" step="0.25" />
    <label style="display:flex;align-items:center;gap:8px;margin-top:8px"><input id="toggleOrbits" type="checkbox" checked /> Órbitas</label>
    <label style="display:flex;align-items:center;gap:8px;margin-top:6px"><input id="toggleLabels" type="checkbox" checked /> Etiquetas</label>
    <h2 style="margin:12px 0 8px;font-size:14px;color:var(--muted)">Cuerpos</h2>
    <div class="list" id="list"></div>
  </aside>
</div>

<script src="https://unpkg.com/three@0.161.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.161.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.161.0/examples/js/renderers/CSS2DRenderer.js"></script>
<script>
// ----- Scene basics (no ES modules; uses global THREE) -----
const container = document.getElementById('scene');
const labelLayer = document.getElementById('labels');
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio||1));
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

const labelRenderer = new THREE.CSS2DRenderer();
labelRenderer.setSize(container.clientWidth, container.clientHeight);
labelRenderer.domElement.style.position='absolute';
labelRenderer.domElement.style.inset='0';
labelRenderer.domElement.style.pointerEvents='none';
labelLayer.appendChild(labelRenderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05070d, 0.015);

const camera = new THREE.PerspectiveCamera(55, container.clientWidth/container.clientHeight, 0.1, 2000);
camera.position.set(0, 6, 28);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.06; controls.minDistance=4; controls.maxDistance=120;
renderer.domElement.addEventListener('dblclick', ()=>{camera.position.set(0,6,28); controls.target.set(0,0,0); currentFocus=-1; focusOffset.set(0,0,0);});

// Starfield
const stars = new THREE.Points(
  new THREE.BufferGeometry(),
  new THREE.PointsMaterial({ size:0.04, color:0x9fb0cf, depthWrite:false })
);
(function makeStars(){
  const N=4000; const pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){ const r=THREE.MathUtils.randFloat(100,400); const t=Math.random()*Math.PI*2; const p=Math.acos(THREE.MathUtils.randFloatSpread(2));
    pos[i*3+0]=r*Math.sin(p)*Math.cos(t); pos[i*3+1]=r*Math.cos(p)*0.6; pos[i*3+2]=r*Math.sin(p)*Math.sin(t);
  }
  stars.geometry.setAttribute('position', new THREE.BufferAttribute(pos,3));
})();
scene.add(stars);

// Sun (emissive) + light
const sunGeo = new THREE.SphereGeometry(2.4, 48, 48); 
const sunMat = new THREE.MeshBasicMaterial({ color:0xffd27a });
const sun = new THREE.Mesh(sunGeo, sunMat); scene.add(sun);
const sunLight = new THREE.PointLight(0xfff0c0, 2.6, 0, 2); sunLight.position.set(0,0,0); scene.add(sunLight);

// Planet system (scaled, non-linear)
const palette = { mercury:0xbfbfbf, venus:0xf5c97a, earth:0x7fc8ff, mars:0xff9b6b, jupiter:0xf4d7a1, saturn:0xf7e2ac, uranus:0xa7f1ff, neptune:0x7fb7ff };
const bodies = [
  { id:'mercury', name:'Mercurio', r:0.38, dist:4.5, year:0.24, tilt:0.03 },
  { id:'venus', name:'Venus', r:0.95, dist:6.5, year:0.62, tilt:177.4 },
  { id:'earth', name:'Tierra', r:1.00, dist:8.5, year:1.00, tilt:23.4 },
  { id:'mars', name:'Marte', r:0.53, dist:11.5, year:1.88, tilt:25.2 },
  { id:'jupiter', name:'Júpiter', r:11.2, dist:17.5, year:11.86, tilt:3.1 },
  { id:'saturn', name:'Saturno', r:9.45, dist:24.5, year:29.46, tilt:26.7, ring:true },
  { id:'uranus', name:'Urano', r:4.01, dist:31.0, year:84.01, tilt:97.8, ring:true },
  { id:'neptune', name:'Neptuno', r:3.88, dist:37.0, year:164.8, tilt:28.3 }
];

const group = new THREE.Group(); scene.add(group);
const orbits = new THREE.Group(); scene.add(orbits);
const meshById = new Map();

for(const b of bodies){
  const radius = Math.max(0.22, Math.log(1+b.r)*0.7);
  const geo = new THREE.SphereGeometry(radius, 32, 24);
  const mat = new THREE.MeshStandardMaterial({ color: palette[b.id]||0xcccccc, roughness:0.6, metalness:0.0 });
  const m = new THREE.Mesh(geo, mat); m.userData = { baseR: radius, body:b };
  group.add(m); meshById.set(b.id, m);

  // label
  const div = document.createElement('div'); div.textContent=b.name; div.style.color='#cfe3ff'; div.style.fontSize='12px'; div.style.textShadow='0 1px 2px #000';
  const lbl = new THREE.CSS2DObject(div); lbl.position.set(0, radius+0.6, 0); m.add(lbl); m.userData.label = lbl;

  // orbit (circle)
  const og = new THREE.BufferGeometry().setFromPoints(new THREE.Path().absarc(0,0, b.dist, 0, Math.PI*2, false).getSpacedPoints(200));
  const ol = new THREE.LineLoop(og, new THREE.LineBasicMaterial({ color:0x89a0ff, transparent:true, opacity:0.35 }));
  ol.rotation.x = THREE.MathUtils.degToRad(90);
  orbits.add(ol); m.userData.orbitLine = ol;
}

// Saturn rings (simple disc)
(function(){
  const sat = meshById.get('saturn'); if(!sat) return; const ring = new THREE.Mesh(
    new THREE.RingGeometry(sat.userData.baseR*1.7, sat.userData.baseR*3.0, 64, 1),
    new THREE.MeshBasicMaterial({ color:0xd6cbb5, transparent:true, opacity:0.7, side:THREE.DoubleSide })
  );
  ring.rotation.x=THREE.MathUtils.degToRad(90);
  sat.add(ring);
})();

// Moon (only Earth)
const earth = meshById.get('earth');
let moon; if(earth){
  moon = new THREE.Mesh(new THREE.SphereGeometry(0.17, 24, 16), new THREE.MeshStandardMaterial({ color:0xdedede }));
  earth.add(moon); moon.position.x = 1.2;
}

// ambient + subtle hemi
scene.add(new THREE.AmbientLight(0x222a44, 0.7));
const hemi = new THREE.HemisphereLight(0x334466, 0x0a0c18, 0.4); scene.add(hemi);

// UI wiring
const list=document.getElementById('list');
const paletteHex = {mercury:'#c0c0c0', venus:'#f2c283', earth:'#7fc8ff', mars:'#ff9b6b', jupiter:'#e3cba1', saturn:'#f7e2ac', uranus:'#a7f1ff', neptune:'#7fb7ff'};

bodies.forEach((b,i)=>{
  const el=document.createElement('div'); el.className='card';
  el.innerHTML=`<div class="dot" style="background:${paletteHex[b.id]||'#ccc'}"></div><div><div style="font-weight:700">${b.name}</div><div class="meta">Dist ~${b.dist} · Año ~${b.year}</div></div><button class="btn" data-i="${i}">Enfocar</button>`;
  list.appendChild(el);
});
list.addEventListener('click', (e)=>{const btn=e.target.closest('button[data-i]'); if(!btn) return; focus(parseInt(btn.dataset.i,10));});

const playBtn=document.getElementById('play');
const speedR=document.getElementById('speed');
const speedVal=document.getElementById('speedVal');
const resetT=document.getElementById('resetT');
const photo=document.getElementById('photo');
const togOrbits=document.getElementById('toggleOrbits');
const togLabels=document.getElementById('toggleLabels');

let playing=false; let tSim=0; let speed=1; let photoMode=false;
playBtn.onclick=()=>{playing=!playing; playBtn.textContent=playing?'⏸︎ Pausa':'⏵︎ Reproducir'};
resetT.onclick=()=>{tSim=0};
speedR.oninput=()=>{speed=+speedR.value; speedVal.textContent=(speed%1===0?speed.toFixed(0):speed.toFixed(2))+'×'};
photo.onclick=()=>{photoMode=!photoMode; document.getElementById('ui').style.display=photoMode?'none':'block'};

window.addEventListener('keydown',(e)=>{
  if(e.key>='1'&&e.key<='9'){focus(Math.min(bodies.length-1, e.key.charCodeAt(0)-49));}
  if(e.key==='f'||e.key==='F'){focus(currentFocus>=0?currentFocus:2);} // Earth default
});

// Focus logic
let currentFocus=-1; let focusT=0; const focusFrom={pos:new THREE.Vector3(), target:new THREE.Vector3()}; const focusTo={pos:new THREE.Vector3(), target:new THREE.Vector3()};
const focusOffset=new THREE.Vector3();
function planetPosition(b){ const ang = tSim / Math.max(0.0001, b.year*0.7) * Math.PI*2; return new THREE.Vector3(Math.cos(ang)*b.dist, 0, Math.sin(ang)*b.dist); }
function focus(i){ const b=bodies[i]; if(!b) return; currentFocus=i; focusT=0; focusFrom.pos.copy(camera.position); focusFrom.target.copy(controls.target);
  const p=planetPosition(b); focusTo.target.copy(p);
  const dist = THREE.MathUtils.clamp(b.dist*0.8 + Math.log(1+b.r)*2.0, 5, 70);
  focusTo.pos.copy(p).add(new THREE.Vector3(dist*0.8, dist*0.32, dist*0.8));
  focusOffset.copy(focusTo.pos).sub(focusTo.target);
}

function updateToggles(){ orbits.visible=togOrbits.checked; bodies.forEach(b=>{ const m=meshById.get(b.id); if(m) m.userData.label.element.style.display = togLabels.checked?'block':'none'; }); }
updateToggles();
[togOrbits,togLabels].forEach(x=>x.addEventListener('change',updateToggles));

function onResize(){ const r=container.getBoundingClientRect(); renderer.setSize(r.width,r.height,false); labelRenderer.setSize(r.width,r.height); camera.aspect=r.width/r.height; camera.updateProjectionMatrix(); }
window.addEventListener('resize', onResize);
onResize();

// Animate
const fpsEl=document.getElementById('fps'); let last=performance.now(), acc=0, cnt=0, lastFPS=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  const rawDt=(now-last)/1000;
  const dt=Math.max(1e-3, Math.min(0.05, rawDt));
  last=now;
  if(playing) tSim += dt*speed;

  for(const b of bodies){ const m=meshById.get(b.id); const p=planetPosition(b); m.position.copy(p); m.rotation.y += 0.5*dt; }
  if(moon && earth){ moon.rotation.y += 0.2*dt; moon.position.x = 1.2*Math.cos(tSim*2.5); moon.position.z = 1.2*Math.sin(tSim*2.5); }

  if(currentFocus>=0){
    const body=bodies[currentFocus];
    const m=meshById.get(body.id);
    if(m){
      const p=planetPosition(body);
      focusTo.target.copy(p);
      if(focusOffset.lengthSq()===0){
        focusOffset.copy(focusTo.pos).sub(focusTo.target);
      }
      focusTo.pos.copy(p).add(focusOffset);

      if(focusT<1){
        focusT=Math.min(1, focusT+dt*1.5);
        const ease=1-Math.pow(1-focusT,3);
        camera.position.lerpVectors(focusFrom.pos, focusTo.pos, ease);
        controls.target.lerpVectors(focusFrom.target, focusTo.target, ease);
        if(focusT>=1-1e-3){
          camera.position.copy(focusTo.pos);
          controls.target.copy(focusTo.target);
          focusFrom.pos.copy(focusTo.pos);
          focusFrom.target.copy(focusTo.target);
        }
      }else{
        camera.position.lerp(focusTo.pos, Math.min(1, dt*3));
        controls.target.lerp(focusTo.target, Math.min(1, dt*3));
        focusFrom.pos.copy(camera.position);
        focusFrom.target.copy(controls.target);
      }
    }
  }else{
    focusOffset.set(0,0,0);
  }

  controls.update();
  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);

  acc += 1/dt; cnt++; if(now-lastFPS>500){ fpsEl.textContent='FPS: '+((acc/cnt)|0); acc=0; cnt=0; lastFPS=now; }
}
animate();
</script>
</body>
</html>
